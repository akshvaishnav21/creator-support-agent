<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreatorIQ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #111;
      background: #f9fafb;
      width: 320px;
      min-height: 200px;
    }

    .header {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 10px;
      letter-spacing: 0.5px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header span { font-size: 11px; opacity: 0.8; }

    .section { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; }
    .section:last-child { border-bottom: none; }

    label { display: block; font-size: 10px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

    input[type="password"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 12px;
      font-family: monospace;
      background: white;
    }
    input[type="password"]:focus { outline: 2px solid #2563eb; border-color: transparent; }

    .btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
    .btn-comments { background: #7c3aed; color: white; }
    .btn-comments:hover { background: #6d28d9; transform: translateY(-1px); }
    .btn-titles { background: #ea580c; color: white; }
    .btn-titles:hover { background: #c2410c; transform: translateY(-1px); }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #e5e7eb;
      text-align: center;
      font-size: 11px;
    }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-save { background: #16a34a; color: white; padding: 6px 12px; width: auto; display: inline-block; font-size: 11px; border-radius: 6px; }
    .btn-save:hover { background: #15803d; }

    .key-row { display: flex; gap: 6px; align-items: center; }
    .key-row input { flex: 1; }

    .tool-list { display: flex; flex-direction: column; gap: 6px; }

    .video-title {
      font-size: 12px;
      font-weight: 600;
      color: #1f2937;
      background: #f3f4f6;
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .data-badges {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 100px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .badge-ok { background: #dcfce7; color: #166534; }
    .badge-warn { background: #fef3c7; color: #92400e; }
    .badge-none { background: #f3f4f6; color: #6b7280; }
    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      display: inline-block;
    }
    .badge-ok .badge-dot { background: #16a34a; }
    .badge-warn .badge-dot { background: #d97706; }
    .badge-none .badge-dot { background: #9ca3af; }

    .copy-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .btn-copy {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: white;
      color: #374151;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .btn-copy:hover { background: #f3f4f6; border-color: #9ca3af; }
    .btn-copy:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-copy.copied { background: #dcfce7; border-color: #86efac; color: #166534; }

    .status { font-size: 11px; color: #6b7280; margin-top: 4px; }
    .status.ok { color: #16a34a; }
    .status.warn { color: #d97706; }

    .not-youtube {
      padding: 24px 16px;
      text-align: center;
      color: #6b7280;
      font-size: 12px;
    }
    .not-youtube strong { display: block; color: #374151; margin-bottom: 6px; font-size: 13px; }

    .refresh-link {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      color: #2563eb;
      cursor: pointer;
      font-weight: 600;
    }
    .refresh-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">CIQ</div>
    <div>
      <h1>CreatorIQ</h1>
      <span>AI tools for YouTube creators</span>
    </div>
  </div>

  <!-- API Key section -->
  <div class="section" id="key-section">
    <label>Gemini API Key</label>
    <div class="key-row">
      <input type="password" id="api-key-input" placeholder="AIza..." />
      <button class="btn btn-save" id="save-key-btn">Save</button>
    </div>
    <p class="status" id="key-status"></p>
  </div>

  <!-- YouTube-only content -->
  <div id="youtube-content" style="display:none;">
    <div class="section">
      <label>Current Video</label>
      <div class="video-title" id="video-title">Loading...</div>

      <!-- Data status badges -->
      <div class="data-badges" id="data-badges">
        <span class="badge badge-none" id="badge-captions"><span class="badge-dot"></span> Captions: checking...</span>
        <span class="badge badge-none" id="badge-comments"><span class="badge-dot"></span> Comments: checking...</span>
      </div>

      <!-- Copy buttons -->
      <div class="copy-row">
        <button class="btn-copy" id="btn-copy-captions" disabled>Copy Captions</button>
        <button class="btn-copy" id="btn-copy-comments" disabled>Copy Comments</button>
      </div>

      <span class="refresh-link" id="btn-refresh">Refresh data</span>
    </div>

    <div class="section">
      <label>Open in CreatorIQ</label>
      <div class="tool-list">
        <button class="btn btn-primary" id="btn-sponsorship">
          Sponsorship Fit Analyzer
        </button>
        <button class="btn btn-comments" id="btn-comments">
          Comment Intelligence
        </button>
        <button class="btn btn-titles" id="btn-titles">
          Hook &amp; Title Factory
        </button>
      </div>
    </div>
  </div>

  <!-- Non-YouTube page message -->
  <div id="not-youtube" style="display:none;" class="not-youtube">
    <strong>Navigate to a YouTube video</strong>
    to import captions and comments.
    <br/><br/>
    <a href="#" id="open-app-link" style="color:#2563eb; font-weight:600;">Open CreatorIQ →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
