<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreatorIQ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #111;
      background: #f9fafb;
      width: 300px;
      min-height: 200px;
    }

    .header {
      background: #2563eb;
      color: white;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header span { font-size: 11px; opacity: 0.8; }

    .section { padding: 12px 14px; border-bottom: 1px solid #e5e7eb; }
    .section:last-child { border-bottom: none; }

    label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }

    input[type="password"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      background: white;
    }
    input[type="password"]:focus { outline: 2px solid #2563eb; border-color: transparent; }

    .btn {
      display: block;
      width: 100%;
      padding: 7px 10px;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-save { background: #16a34a; color: white; padding: 5px 10px; width: auto; display: inline-block; font-size: 11px; }
    .btn-save:hover { background: #15803d; }

    .key-row { display: flex; gap: 6px; align-items: center; }
    .key-row input { flex: 1; }

    .tool-list { display: flex; flex-direction: column; gap: 6px; }

    .video-title {
      font-size: 11px;
      color: #374151;
      background: #f3f4f6;
      border-radius: 5px;
      padding: 5px 8px;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status { font-size: 11px; color: #6b7280; margin-top: 4px; }
    .status.ok { color: #16a34a; }
    .status.warn { color: #d97706; }

    .not-youtube {
      padding: 20px 14px;
      text-align: center;
      color: #6b7280;
      font-size: 12px;
    }
    .not-youtube strong { display: block; color: #374151; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>CreatorIQ</h1>
      <span>AI tools for YouTube creators</span>
    </div>
  </div>

  <!-- API Key section -->
  <div class="section" id="key-section">
    <label>Gemini API Key</label>
    <div class="key-row">
      <input type="password" id="api-key-input" placeholder="AIza..." />
      <button class="btn btn-save" id="save-key-btn">Save</button>
    </div>
    <p class="status" id="key-status"></p>
  </div>

  <!-- YouTube-only content -->
  <div id="youtube-content" style="display:none;">
    <div class="section">
      <label>Current Video</label>
      <div class="video-title" id="video-title">Loading...</div>
      <div class="status" id="data-status"></div>
    </div>

    <div class="section">
      <label>Open in CreatorIQ</label>
      <div class="tool-list">
        <button class="btn btn-primary" id="btn-sponsorship">
          🤝 Sponsorship Fit Analyzer
        </button>
        <button class="btn btn-primary" id="btn-comments">
          💬 Comment Intelligence
        </button>
        <button class="btn btn-primary" id="btn-titles">
          ✍️ Hook &amp; Title Factory
        </button>
      </div>
    </div>
  </div>

  <!-- Non-YouTube page message -->
  <div id="not-youtube" style="display:none;" class="not-youtube">
    <strong>Navigate to a YouTube video</strong>
    to import transcripts and comments.
    <br/><br/>
    <a href="#" id="open-app-link" style="color:#2563eb; font-weight:600;">Open CreatorIQ →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
